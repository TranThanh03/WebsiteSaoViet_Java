<header th:fragment="header">
    <div class="header-container">
        <div class="logo">
            <img src="/admin/img/logo.jpg" alt="logo">
            <p>Sao Việt</p>
        </div>
        <div class="search">
            <div class="sub-search">
            </div>
        </div>
        <div class="content-right">
            <div class="icon-account">
                <a href="/auth/logout">
                    <img src="/admin/icons/user-regular.svg" alt="icon"></i>
                    <p>Đăng xuất</p>
                </a>
            </div>
        </div>
    </div>

    <nav>
        <ul class="menu">
            <li><a href="/manage/index">Trang chủ</a></li>
            <li><a href="/users/manage/index">Khách hàng</a></li>
            <li><a href="/tours/manage/index">Tours</a></li>
            <li><a href="/guides/manage/index">Hướng dẫn viên</a></li>
            <li><a href="/tasks/manage/index">Phân công</a></li>
            <li><a href="/calendars/manage/index">Đơn đặt</a></li>
        </ul>
    </nav>

    <div class="notifi">
        <div class="title">
            <input type="hidden" id="code" value="@{code ?? ''}">
            <input type="hidden" id="code2" value="@{code2 ?? ''}">
            <p id="message">@{message ?? ''}</p>
        </div>
        <div class="content">
            <p id="countdown"></p>
        </div>
    </div>
</header>
