<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="admin/fragments/head::head"></head>
<body>
<div th:replace="admin/fragments/header::header"></div>

<div class="guide">
    <div class="main">
        <div class="insert-guide">
            <div class="insert-content">
                <h2>Thêm hướng dẫn viên</h2>
                <form th:action="@{/guides}" method="post" enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="name">Tên hướng dẫn viên</label>
                        <input type="text" name="TenHDV" id="name" required />
                    </div>

                    <div class="form-group">
                        <label for="phone">Số điện thoại</label>
                        <input type="tel" name="SDT" id="phone" required pattern="[0-9]{10}"/>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" name="Email" id="email" required />
                    </div>

                    <div class="form-group">
                        <label for="birthday">Ngày sinh</label>
                        <input type="date" name="NgaySinh" id="birthday" required />
                    </div>

                    <div class="form-group">
                        <label for="gender">Giới tính</label>
                        <select name="GioiTinh" id="gender" >
                            <option value="Nam" >Nam</option>
                            <option value="Nữ" >Nữ</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="MoTa">Mô tả</label>
                        <textarea name="MoTa" id="MoTa" rows="5" required ></textarea>
                    </div>

                    <div class="form-group">
                        <label for="avatar">Ảnh</label>
                        <div class="input-wrapper">
                            <img class="avatar-img" th:src="${'/admin/img/no-image.png'}" alt="Ảnh đại diện" id="avatar-preview"/>
                            <input type="file" name="avatar-input" id="avatar" class="avatar-input" required/>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="rating">Đánh giá</label>
                        <select id="rating" name="DanhGia">
                            <option th:each="i : ${#numbers.sequence(1, 5)}" th:value="${i}" th:text="${i} + ' sao'"></option>
                        </select>
                    </div>

                    <div class="button-group">
                        <a th:href="@{/guides/manage/index}" class="btn btn-secondary">Quay về</a>
                        <button type="submit" name="btn-insert" class="btn btn-primary">Thêm</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    CKEDITOR.replace("GioiThieu");
    CKEDITOR.replace("MoTa");
</script>

<footer th:replace="admin/fragments/footer::footer"></footer>
</body>
</html>
