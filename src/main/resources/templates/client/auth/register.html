<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/client/img/logo.jpg" type="image/jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Đăng ký</title>
</head>
<body style="background: url('/client/img/background.jpg') no-repeat; background-size: cover;">
<div class="container d-flex justify-content-center align-items-center min-vh-100 box-area0" style="font-family:'Segoe UI';">
    <div class="row border rounded-5 p-3 bg-white shadow box-area1">
        <h1 class="text-center">Đăng ký tài khoản</h1>
        <form th:action="@{/auth/register}" method="post">
            <div class="form-floating mb-1 mt-1">
                <input type="text" class="form-control" id="name" placeholder="Họ và tên" name="tenkh" th:value="${tenkh != null ? tenkh : ''}">
                <label for="name">Họ và tên</label>
            </div>
            <div class="form-floating mb-1 mt-1">
                <input type="text" class="form-control" id="phone" placeholder="Số điện thoại" name="sdt" th:value="${sdt != null ? sdt : ''}">
                <label for="phone">Số điện thoại</label>
            </div>
            <div class="form-floating mb-1 mt-1">
                <input type="email" class="form-control" id="email" placeholder="Email" name="email" th:value="${email != null ? email : ''}">
                <label for="email">Email</label>
            </div>
            <div class="form-floating mb-1 mt-1">
                <input type="password" class="form-control" id="pwd" placeholder="Mật khẩu" name="matkhau">
                <label for="pwd">Mật khẩu</label>
            </div>
            <div class="form-floating mb-1 mt-1">
                <input type="password" class="form-control" id="repeatpw" placeholder="Nhập lại mật khẩu" name="repeatpw">
                <label for="repeatpw">Nhập lại mật khẩu</label>
            </div>
            <div>
                <p style="color: red; padding-top:4px;" th:text="${warning}"></p>
                <button type="submit" class="btn btn-lg btn-primary w-100 fs-6">Đăng ký</button>
                <p>Bằng việc đăng ký tài khoản bạn đã đồng ý với <a href="#">Điều khoản sử dụng</a> của chúng tôi!</p>
                <p>Bạn đã có tài khoản? <a th:href="@{/auth/login}">Đăng nhập</a></p>
            </div>
        </form>
    </div>
</div>
</body>
</html>
